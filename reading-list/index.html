<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading List</title>
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://use.typekit.net">
<!-- Shackleton (Adobe Fonts / Typekit) -->
<link rel="stylesheet" href="https://use.typekit.net/zkf6zbb.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="bg-decoration"></div>

<div class="app">
  <header class="app-header">
    <div class="brand">
      <a class="brand-mark" href="/" aria-label="Investing Buffalo home">
        <span class="brand-mark-icon" role="img" aria-label="Investing Buffalo"></span>
      </a>
      <div class="header-text">
        <h1>Reading List</h1>
        <p>Books that have shaped how I think about money and investing</p>
      </div>
    </div>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </header>

  <main class="narrow-layout">
    <div class="book-list">

      <div class="book-entry">
        <p class="book-author">Jason Greystone</p>
        <a class="card tool-box" href="https://www.amazon.co.uk/Always-Free-become-financially-inspired/dp/1781339015/" target="_blank" rel="noopener">
          <span class="tool-box-badge">Book</span>
          Always Free
        </a>
      </div>

      <div class="book-entry">
        <p class="book-author">Robert Kiyosaki</p>
        <a class="card tool-box" href="https://www.amazon.co.uk/Rich-Dad-Poor-Teach-Middle/dp/1612681123/" target="_blank" rel="noopener">
          <span class="tool-box-badge">Book</span>
          Rich Dad Poor Dad
        </a>
      </div>

      <!-- To add another book, copy one of the .book-entry blocks above -->

    </div>
  </main>
</div>

<script src="/theme.js"></script>
</body>
</html>
